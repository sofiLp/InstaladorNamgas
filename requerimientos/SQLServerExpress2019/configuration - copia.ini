; SQL Server 2019 Configuration File for SaaS (with SQL Login 'namagas')
; Este archivo se utiliza para la instalación silenciosa de SQL Server Express.

; --- Configuración General del Instalador ---
ACTION="Install"                  ; Indica que la acción a realizar es una instalación.
QUIET="True"                      ; Hace que la instalación sea silenciosa (sin interfaz de usuario). ˇCrucial para la automatización!
;ACCEPTSQLSERVERLICENSETERMS="True"; Acepta automáticamente los términos de la licencia de SQL Server. Obligatorio para instalaciones silenciosas.
IACCEPTSQLSERVERLICENSETERMS="True"

INDICATEPROGRESS="False"          ; No muestra una barra de progreso en la consola.
UPDATEENABLED="False"             ; Deshabilita la búsqueda de actualizaciones de productos de SQL Server durante la instalación.

; --- Características a Instalar ---
FEATURES="SQLEngine"              ; Especifica las características a instalar. "SQLEngine" es el motor de base de datos, lo mínimo necesario para tu aplicación.

; --- Rutas de Instalación ---
; Rutas donde se instalarán los archivos compartidos y la instancia. Puedes ajustarlas si lo necesitas.
INSTALLSHAREDDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDWOWDIR="C:\Program Files (x86)\Microsoft SQL Server"
INSTANCEDIR="C:\Program Files\Microsoft SQL Server"

; --- Configuración de la Instancia ---
INSTANCENAME="NAMAGAS"            ; Nombre de la instancia de SQL Server. ˇImportante para que tu aplicación se conecte!
INSTANCEID="NAMAGAS"              ; ID de la instancia. Generalmente es el mismo que INSTANCENAME.

; --- Cuentas de Servicio (ˇMUY IMPORTANTE!) ---
; Estas son las cuentas de Windows bajo las cuales se ejecutarán los servicios de SQL Server.
; NO PUEDEN ser logins de SQL Server.
; "NT AUTHORITY\NETWORK SERVICE" es una cuenta de sistema de Windows con privilegios mínimos,
; ideal para servicios que necesitan acceso a la red y recursos locales.
SQLSVCACCOUNT="NT AUTHORITY\NETWORK SERVICE" ; Cuenta para el servicio del Motor de Base de Datos.
SQLSVCPASSWORD=""                 ; No se requiere contraseńa para cuentas de sistema predefinidas.

; Configuración para el servicio SQL Server Agent. SQL Express no lo incluye, pero es buena práctica definirlo.
AGTSVCACCOUNT="NT AUTHORITY\NETWORK SERVICE"
AGTSVCPASSWORD=""
AGTSVCSTARTUPTYPE="Automatic"     ; Inicia el Agent automáticamente (si estuviera disponible).

; --- Autenticación y Administradores ---
SECURITYMODE="SQL"                ; Establece el modo de autenticación en "Mixto" (Mixed Mode).
                                  ; Esto permite la autenticación de Windows Y la autenticación de SQL Server (necesario para 'sa' y 'namagas').
SAPWD="hola123"        ; ˇContraseńa MUY SEGURA para el login 'sa' de SQL Server!
                                  ; Este es el administrador por defecto de SQL Server.
                                  ; En un entorno de producción, esta contraseńa debe ser generada de forma segura.

; Cuentas de Windows que serán sysadmin en SQL Server. Puedes ańadir más si es necesario.
; "NT AUTHORITY\SYSTEM" y "BUILTIN\Administradores" son cuentas/grupos de Windows que tendrán privilegios de sysadmin en SQL Server.
; Esto es útil para que el sistema o los administradores locales puedan gestionar SQL Server.
SQLSYSADMINACCOUNTS="NT AUTHORITY\SYSTEM","BUILTIN\Administradores"

; --- Collation (Configuración de Intercalación) ---
; Define cómo SQL Server maneja las cadenas de caracteres y la ordenación.
; "SQL_Latin1_General_CP1_CI_AS" es una intercalación común para espańol (Case Insensitive, Accent Sensitive).
SQLCOLLATION="SQL_Latin1_General_CP1_CI_AS"

; --- SQL Server Browser (Generalmente no necesario para SaaS) ---
; El servicio Browser ayuda a las aplicaciones a encontrar instancias de SQL Server en la red.
; Para una conexión directa a una instancia con nombre (como localhost\NAMAGAS), no es estrictamente necesario.
BROWSERSVCSTARTUPTYPE="Disabled"  ; Deshabilita el inicio automático del servicio Browser para mayor seguridad y menos recursos.

; --- FILESTREAM (Generalmente no necesario para SaaS) ---
; Permite almacenar datos BLOB (Binary Large Object) directamente en el sistema de archivos NTFS.
FILESTREAMLEVEL="0"               ; Deshabilita FILESTREAM.

; --- Reporte de Errores ---
ERRORREPORTING="False"            ; Deshabilita el envío automático de informes de error a Microsoft.
FEATURES=SQLENGINE,Tools
